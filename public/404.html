<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>404 · Pablo Hurtado</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f1729;
        color: #e2e8f0;
        font-family: "Space Grotesk", system-ui, "Segoe UI", sans-serif;
        text-align: center;
        padding: 24px;
        overflow: hidden;
        position: relative;
      }
      .glow {
        position: absolute;
        width: 36rem; height: 36rem;
        border-radius: 9999px;
        background: rgba(6, 182, 212, 0.18);
        filter: blur(80px);
        top: -8rem; left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
      }
      .wrap { position: relative; z-index: 1; max-width: 32rem; }
      .code {
        font-size: clamp(5rem, 18vw, 9rem);
        font-weight: 700;
        line-height: 1;
        background: linear-gradient(120deg, #06b6d4, #22d3ee);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      h1 { font-size: 1.6rem; margin-top: 1rem; color: #fff; }
      p { margin-top: 0.75rem; color: #94a3b8; line-height: 1.5; }
      a.btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 2rem;
        padding: 0.85rem 1.6rem;
        border-radius: 0.6rem;
        background: #0891b2;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.2s, transform 0.2s;
      }
      a.btn:hover { background: #06b6d4; transform: translateY(-2px); }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="wrap">
      <div class="code">404</div>
      <h1>Esta página no existe</h1>
      <p>Puede que el enlace esté roto o la página se haya movido. Volvamos a lo importante.</p>
      <a class="btn" href="/">← Ir al inicio</a>
    </div>
  </body>
</html>
